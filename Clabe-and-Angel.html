<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            margin: 0;
            padding: 0;
            background: #f9fafb;
            transition: background 0.3s, color 0.3s;
        }
        .chat-bubble-self {
            border-radius: 18px 4px 18px 18px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .chat-bubble-other {
            border-radius: 4px 18px 18px 18px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .card-item {
            background: white;
            border-radius: 16px;
            padding: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .animate-fade-in {
            animation: fadeInUp 0.3s ease forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .popup-menu {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 8px 12px;
            display: flex;
            gap: 16px;
            position: fixed;
            z-index: 300;
            transform: translate(-50%, -120%);
        }
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 10px 16px;
            background: #f0f0f0;
            border-radius: 20px;
            max-width: 80px;
            margin-left: 12px;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #909090;
            border-radius: 50%;
            animation: typing 1.4s infinite both;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%,60%,100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .envelope-shape {
            clip-path: polygon(0 0, 100% 0, 100% 75%, 50% 100%, 0 75%);
        }

        /* 夜间模式样式 */
        body.night-mode {
            background: #1f2937 !important;
            color: #e5e7eb;
        }
        body.night-mode #app-header {
            background-color: #111827 !important;
            border-color: #374151 !important;
        }
        body.night-mode #app-footer {
            background-color: #111827 !important;
            border-color: #374151 !important;
        }
        body.night-mode .chat-bubble-other {
            background-color: #374151 !important;
            color: #e5e7eb;
        }
        body.night-mode .chat-bubble-self {
            background-color: #3b82f6 !important;
        }
        body.night-mode .card-item,
        body.night-mode .bg-white {
            background: #374151 !important;
            color: #e5e7eb;
        }
        body.night-mode .bg-gray-100 {
            background: #4b5563 !important;
        }
        body.night-mode .border,
        body.night-mode .border-gray-200,
        body.night-mode .border-gray-100 {
            border-color: #4b5563 !important;
        }
        body.night-mode input,
        body.night-mode textarea {
            background: #374151 !important;
            color: #e5e7eb;
            border-color: #4b5563 !important;
        }
        body.night-mode .text-gray-500 {
            color: #9ca3af !important;
        }
    </style>
</head>

    <script>
        // ========== 数据库 ==========
        function initDB() {
            const request = indexedDB.open('ClabeAndAngelDB', 2);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('config')) db.createObjectStore('config', { keyPath: 'key' });
                if (!db.objectStoreNames.contains('messages')) { const store = db.createObjectStore('messages', { keyPath: 'id', autoIncrement: true }); store.createIndex('time', 'time', { unique: false }); }
                if (!db.objectStoreNames.contains('cardGroups')) db.createObjectStore('cardGroups', { keyPath: 'id', autoIncrement: true });
                if (!db.objectStoreNames.contains('cards')) { const store = db.createObjectStore('cards', { keyPath: 'id', autoIncrement: true }); store.createIndex('groupId', 'groupId', { unique: false }); }
                if (!db.objectStoreNames.contains('emojis')) db.createObjectStore('emojis', { keyPath: 'id', autoIncrement: true });
                if (!db.objectStoreNames.contains('letters')) { const store = db.createObjectStore('letters', { keyPath: 'id', autoIncrement: true }); store.createIndex('sendTime', 'sendTime', { unique: false }); }
            };
            request.onsuccess = (e) => { db = e.target.result; initApp(); };
            request.onerror = () => alert('数据库初始化失败');
        }

        async function initApp() {
            await loadConfig();
            applyNightMode();
            applySkin();
            await loadMessages();
            await loadCardGroups();
            await loadCards(activeCardGroup);
            await loadEmojis();
            await loadLetters();
            bindAutoResize();

        // ========== 消息 ==========
        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text && !quoteMessage) return;
            const msg = { text: text || '[图片]', sender: 'self', time: Date.now(), type: 'text' };
            if (quoteMessage) { msg.quoteContent = quoteMessage.text; msg.quoteSender = quoteMessage.sender === 'self' ? '我' : currentConfig.otherName; msg.type = 'quote'; }
            await addMessage(msg);
            input.value = ''; input.style.height = 'auto'; clearQuote();
            await loadMessages();
            scheduleReply();
        }
        async function sendEmojiMessage(dataUrl) {
            await addMessage({ text: '', sender: 'self', time: Date.now(), type: 'image', imageData: dataUrl });
            await loadMessages();
            scheduleReply();

        function addMessage(msg) { return new Promise(resolve => { const tx = db.transaction('messages','readwrite'); tx.objectStore('messages').add(msg); tx.oncomplete = resolve; }); }
        function loadMessages() {
            return new Promise(resolve => {
                const tx = db.transaction('messages','readonly');
                tx.objectStore('messages').index('time').getAll().onsuccess = (e) => {
                    renderMessages(e.target.result || []);
                    resolve();
                };
            });
        }
        function renderMessages(messages) {
            const container = document.getElementById('chat-list');
            container.innerHTML = '';
            messages.forEach(msg => {
                const isSelf = msg.sender === 'self';
                const bubble = document.createElement('div');
                bubble.className = `flex ${isSelf ? 'justify-end' : 'justify-start'} w-full animate-fade-in`;
                bubble.dataset.id = msg.id;
                const inner = document.createElement('div');
                inner.className = `max-w-[80%] px-4 py-3 text-sm ${isSelf ? 'chat-bubble-self text-white' : 'chat-bubble-other text-gray-800'}`;
                inner.style.backgroundColor = isSelf ? currentConfig.skin.selfBubble : currentConfig.skin.otherBubble;
                if (msg.type === 'quote' && msg.quoteContent) inner.innerHTML = `<div class="text-xs opacity-70 border-l-2 pl-2 mb-1">${msg.quoteSender}: ${msg.quoteContent}</div>${msg.text}`;
                else if (msg.type === 'image') inner.innerHTML = `<img src="${msg.imageData}" class="max-w-full rounded-lg" style="max-height:200px;">`;
                else if (msg.type === 'pat') inner.innerHTML = `<span class="italic text-gray-500">${msg.text}</span>`;
                else if (msg.type === 'system') inner.innerHTML = `<span class="text-gray-400">${msg.text}</span>`;
                else inner.textContent = msg.text;
                const time = document.createElement('span');
                time.className = 'text-xs opacity-60 block mt-1'; time.textContent = formatTime(msg.time);
                inner.appendChild(time);
                bubble.appendChild(inner);
                bubble.addEventListener('contextmenu', e => { e.preventDefault(); showMessageMenu(msg, e); });
                container.appendChild(bubble);
            });

        function showMessageMenu(msg, event) {
            const old = document.querySelector('.popup-menu'); if (old) old.remove();
            const menu = document.createElement('div');
            menu.className = 'popup-menu text-white text-sm';
            menu.innerHTML = `<button class="flex flex-col items-center"><span>↩️</span><span>引用</span></button><button class="flex flex-col items-center"><span>📋</span><span>复制</span></button><button class="flex flex-col items-center"><span>🗑️</span><span>删除</span></button>`;
            menu.style.left = event.clientX + 'px'; menu.style.top = event.clientY + 'px';
            document.body.appendChild(menu);
            menu.querySelector('button:first-child').onclick = () => { quoteMessage = msg; document.getElementById('quote-box').classList.remove('hidden'); document.getElementById('quote-sender').textContent = msg.sender==='self'?'我':currentConfig.otherName; document.getElementById('quote-content').textContent = msg.text||'[图片]'; menu.remove(); };
            menu.querySelector('button:nth-child(2)').onclick = () => { navigator.clipboard.writeText(msg.text||''); menu.remove(); };
            menu.querySelector('button:last-child').onclick = async () => { if(confirm('删除？')) { await deleteMessage(msg.id); await loadMessages(); } menu.remove(); };
            setTimeout(() => document.addEventListener('click', () => menu.remove(), {once:true}), 100);

        function deleteMessage(id) { return new Promise(resolve => { const tx = db.transaction('messages','readwrite'); tx.objectStore('messages').delete(id); tx.oncomplete = resolve; }); }

        // ========== 回复与概率 ==========
        function scheduleReply() {
            if (replyTimers.current) clearTimeout(replyTimers.current);
            const minMs = (currentConfig.replyMinSeconds||10)*1000;
            const maxMs = (currentConfig.replyMaxMinutes||5)*60*1000;
            const delay = Math.random()*(maxMs-minMs)+minMs;
            showTyping();
            replyTimers.current = setTimeout(async () => {
                hideTyping();
                if (Math.random() < 0.03) { sendPat('other'); await new Promise(r=>setTimeout(r,800)); }
                const rand = Math.random();
                let count = 1; if (rand < 0.75) count=1; else if (rand < 0.95) count=2; else count=3;
                for (let i=0;i<count;i++) { await generateProbReply(); if(i<count-1) await new Promise(r=>setTimeout(r,600+Math.random()*1500)); }
                loadMessages();
            }, delay);
        }
        async function generateProbReply() {
            const cards = await getAllCards();
            if (!cards.length) { await addMessage({text:'嗯嗯',sender:'other',time:Date.now(),type:'text'}); return; }
            let text = cards[Math.floor(Math.random()*cards.length)].text;
            let quoteMsg=null, imageData=null;
            if(Math.random()<0.3) {
                const recent = await getRecentSelfMessages(10);
                if(recent.length) quoteMsg = recent[Math.floor(Math.random()*recent.length)];
            }
            if(Math.random()<0.2) {
                const emojis = await getAllEmojis();
                if(emojis.length) imageData = emojis[Math.floor(Math.random()*emojis.length)].dataUrl;
            }
            await addMessage({text, sender:'other', time:Date.now(), type:imageData?'image':'text', imageData, quoteContent:quoteMsg?.text, quoteSender:quoteMsg?'我':null});
        }
        function getRecentSelfMessages(limit) {
            return new Promise(resolve => {
                const tx = db.transaction('messages','readonly');
                const store = tx.objectStore('messages');
                const index = store.index('time');
                const req = index.openCursor(null, 'prev');
                const results = [];
                req.onsuccess = (e) => {
                    const cursor = e.target.result;
                    if(cursor && results.length < limit) { if(cursor.value.sender==='self') results.push(cursor.value); cursor.continue(); }
                    else resolve(results);
                };
            });
        }
        function getAllCards() { return new Promise(resolve => { const tx=db.transaction('cards','readonly'); tx.objectStore('cards').getAll().onsuccess=e=>resolve(e.target.result||[]); }); }
        function getAllEmojis() { return new Promise(resolve => { const tx=db.transaction('emojis','readonly'); tx.objectStore('emojis').getAll().onsuccess=e=>resolve(e.target.result||[]); }); }

            if(document.getElementById('typing-indicator')) return;
            const div = document.createElement('div'); div.id='typing-indicator'; div.className='flex justify-start';
            div.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            document.getElementById('chat-list').appendChild(div); scrollChatBottom();
        }
        function hideTyping() { const el = document.getElementById('typing-indicator'); if(el) el.remove(); }

        }

        async function addBatchCard() {
            const text = document.getElementById('batch-card-input').value.trim();

            const lines = text.split('\n').map(l=>l.trim()).filter(l=>l);

        function importCardFile(input) {
            const file = input.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                let cards = [];
                if(file.name.endsWith('.json')) {
                    try {
                        const data = JSON.parse(e.target.result);
                        cards = data.customReplies || data.cards || data;
                        if(Array.isArray(cards)) cards = cards.map(c=>typeof c==='string'?c:c.text).filter(Boolean);
                    } catch(ex) { alert('JSON文件格式错误'); return; }
                } else {
                    cards = e.target.result.split(/[\r\n]+/).filter(l=>l.trim());
                }
                if(!cards.length) { alert('未识别到字卡'); return; }
                const tx = db.transaction('cards','readwrite');
                const store = tx.objectStore('cards');
                const existing = await new Promise(r=>{store.index('groupId').getAll(activeCardGroup).onsuccess=ev=>r(ev.target.result||[]);});
                const set = new Set(existing.map(c=>c.text));
                cards.filter(c => !set.has(c)).forEach(c => store.add({groupId:activeCardGroup, text:c}));
                tx.oncomplete = () => { closeImportCardModal(); loadCards(activeCardGroup); alert(`成功导入${cards.length}条字卡`); };
            };
            reader.readAsText(file);
            input.value='';
        }

            if(!content) return;
            await new Promise(resolve => { const tx=db.transaction('letters','readwrite'); tx.objectStore('letters').add({type:'sent',text:content,sendTime:Date.now()}); tx.oncomplete=resolve; });

        function scheduleLetterReply() {
            if(letterReplyTimer) clearTimeout(letterReplyTimer);
            const delay = Math.random()*(24*60*60*1000 - 10*60*60*1000) + 10*60*60*1000;
            letterReplyTimer = setTimeout(async () => {
                await generateReplyForLetter();
                await new Promise(resolve => { const tx=db.transaction('letters','readwrite'); tx.objectStore('letters').add({type:'received',text:'已回复',sendTime:Date.now()}); tx.oncomplete=resolve; });
                loadLetters();

        async function generateReplyForLetter() {
            const cards = await getAllCards();
            if(cards.length) {
                let text = cards[Math.floor(Math.random()*cards.length)].text;
                if(Math.random()>0.5) text += ['，','。','！','？','~'][Math.floor(Math.random()*5)];
                await addMessage({text, sender:'other', time:Date.now(), type:'text'});
            }
        }

            const emojis = await new Promise(r=>db.transaction('emojis').objectStore('emojis').getAll().onsuccess=e=>r(e.target.result));
            const letters = await new Promise(r=>db.transaction('letters').objectStore('letters').getAll().onsuccess=e=>r(e.target.result));
            downloadBlob(new Blob([JSON.stringify({config,messages,groups,cards,emojis,letters})],{type:'application/json'}), 'ClabeAngel_备份.json');
        }
        function importAllData(input) {
            const file = input.files[0]; if(!file) return;
            if(!confirm('导入将覆盖当前所有数据，确定吗？')) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const data = JSON.parse(e.target.result);
                const tx = db.transaction(['config','messages','cardGroups','cards','emojis','letters'], 'readwrite');
                await Promise.all(['config','messages','cardGroups','cards','emojis','letters'].map(store => new Promise(resolve => { tx.objectStore(store).clear().onsuccess = resolve; })));
                (data.config||[]).forEach(c => tx.objectStore('config').add(c));
                (data.messages||[]).forEach(m => tx.objectStore('messages').add(m));
                (data.groups||[]).forEach(g => tx.objectStore('cardGroups').add(g));
                (data.cards||[]).forEach(c => tx.objectStore('cards').add(c));
                (data.emojis||[]).forEach(e => tx.objectStore('emojis').add(e));
                (data.letters||[]).forEach(l => tx.objectStore('letters').add(l));
                tx.oncomplete = () => { alert('导入成功，即将刷新'); location.reload(); };
            };
            reader.readAsText(file);
        }
        function downloadBlob(blob, name) { const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); }

        // ========== 来电 ==========
        function startCallScheduler() {
            if(callTimer) clearTimeout(callTimer);
            const schedule = () => {
                const delay = (15+Math.random()*45)*60000;
                callTimer = setTimeout(() => { if(!currentCallState && Math.random()<0.25) showIncomingCall(); schedule(); }, delay);
            };
            schedule();
        }
        function showIncomingCall() {
            currentCallState='incoming';
            document.getElementById('call-modal').classList.remove('hidden');
            document.getElementById('call-avatar').src=currentConfig.otherAvatar;
            document.getElementById('call-name').textContent=currentConfig.otherName;
            document.getElementById('call-status-text').textContent='来电...';
            document.getElementById('call-timer').classList.add('hidden');
            document.getElementById('call-reject-btn').classList.remove('hidden');
            document.getElementById('call-accept-btn').classList.remove('hidden');
        }
        function initiateCall() {
            if(currentCallState) return;
            currentCallState='calling';
            document.getElementById('call-modal').classList.remove('hidden');
            document.getElementById('call-avatar').src=currentConfig.otherAvatar;
            document.getElementById('call-name').textContent=currentConfig.otherName;
            document.getElementById('call-status-text').textContent='正在呼叫...';
            document.getElementById('call-timer').classList.add('hidden');
            document.getElementById('call-reject-btn').classList.add('hidden');
            document.getElementById('call-accept-btn').classList.add('hidden');
            setTimeout(() => { if(currentCallState==='calling') { Math.random()<0.35 ? endCall('对方未接听') : acceptCall(); } }, 2000);
        }
        function acceptCall() {
            currentCallState='connected';
            document.getElementById('call-status-text').textContent='通话中';
            document.getElementById('call-timer').classList.remove('hidden');
            document.getElementById('call-reject-btn').classList.add('hidden');
            document.getElementById('call-accept-btn').classList.add('hidden');
            callStartTime=Date.now();
            callInterval=setInterval(()=>{
                const diff=Math.floor((Date.now()-callStartTime)/1000);
                document.getElementById('call-timer').textContent=`${String(Math.floor(diff/60)).padStart(2,'0')}:${String(diff%60).padStart(2,'0')}`;
            },1000);
        }
        function rejectCall() { endCall('已拒绝'); }
        function endCall(msg='通话结束') {
            if(callInterval) clearInterval(callInterval);
            currentCallState=null;
            document.getElementById('call-modal').classList.add('hidden');
            if(msg) addMessage({text:msg, sender:'system', time:Date.now(), type:'system'}).then(loadMessages);
        }

        // ========== 状态更新 ==========
        function startStatusUpdater() {
            if(statusUpdateTimer) clearTimeout(statusUpdateTimer);
            const update = () => {
                const pool = currentConfig.statusPool||['在线'];
                const newStatus = pool[Math.floor(Math.random()*pool.length)];
                currentConfig.otherStatus = newStatus;
                document.getElementById('other-status').textContent = newStatus;
                saveConfig();
                statusUpdateTimer = setTimeout(update, (1+Math.random()*7)*3600000);
            };
            statusUpdateTimer = setTimeout(update, (1+Math.random()*7)*3600000);
        }

        function checkBackupReminder() {
            const now = Date.now();
            if(now - (currentConfig.lastBackupReminder||0) > 86400000) {
                if(confirm('💾 温馨提醒：已经超过24小时没有备份数据啦，要现在就导出备份吗？')) exportAllData();
                currentConfig.lastBackupReminder = now;
                saveConfig();
            }
        }

        function formatTime(ts) {
            const d = new Date(ts);
            return `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        }

        initDB();
    </script>
</body>
